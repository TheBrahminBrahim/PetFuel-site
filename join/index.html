<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Join a family on PetFuel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      color-scheme: light dark;
      --teal: #0E7C72;
      --blue: #208AEF;
      --bg: #ffffff;
      --text: #1a1a1a;
      --text-secondary: #5b6664;
      --card-bg: #f4f7f6;
      --border: #e3e9e7;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101513;
        --text: #f2f5f4;
        --text-secondary: #a4b0ad;
        --card-bg: #182420;
        --border: #24322d;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
    }
    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 24px;
      border-radius: 16px;
      overflow: hidden;
      display: block;
    }
    .icon img { width: 100%; height: 100%; display: block; }
    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }
    p {
      font-size: 16px;
      line-height: 1.5;
      color: var(--text-secondary);
      margin: 0 0 16px;
    }
    .steps {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-align: left;
      margin: 24px 0;
    }
    .steps ol {
      margin: 0;
      padding-left: 20px;
    }
    .steps li {
      margin-bottom: 8px;
      color: var(--text);
    }
    .steps li:last-child { margin-bottom: 0; }
    .steps strong { color: var(--teal); }
    a.button {
      display: inline-block;
      background: var(--teal);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 12px;
      margin-top: 8px;
    }
    .fine-print {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 20px;
    }
    .fine-print a { color: var(--blue); }
  </style>
</head>
